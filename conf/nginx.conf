# Giữ 1 worker là đủ cho môi trường demo/lab cục bộ.
worker_processes  1;

# Log runtime và file pid được đặt ngay trong project để dễ kiểm tra khi debug.
error_log  logs/error.log notice;
pid        run/nginx.pid;

events {
    # Giới hạn kết nối ở mức đơn giản cho demo.
    worker_connections  1024;
}

rtmp {
    server {
        # Cổng RTMP dùng cho ingest và RTMP VOD playback.
        listen 1935;
        chunk_size 4096;

        application live {
            # Điểm nhận luồng chính từ OBS hoặc encoder hỗ trợ RTMP.
            live on;

            # Nhân bản luồng live nội bộ:
            # - hls: để tạo HLS xem được trên web
            # - restream: để đẩy tiếp sang nền tảng khác nếu cần
            push rtmp://127.0.0.1:1935/hls;
            push rtmp://127.0.0.1:1935/restream;

            # Gọi sang Next.js khi publisher bắt đầu/kết thúc stream.
            # App dùng callback này để kiểm tra stream key, cập nhật trạng thái,
            # và kích hoạt logic archive sau khi live kết thúc.
            on_publish http://127.0.0.1:3000/api/rtmp/on-publish;
            on_done http://127.0.0.1:3000/api/rtmp/on-done;

            # Ghi lại luồng ingest gốc dưới dạng FLV.
            # FLV phù hợp tự nhiên với RTMP và ghi thời gian thực nhẹ hơn.
            record all;
            record_path data/records;
            record_unique on;

            # Policy publish nội bộ. Có thể đổi sang bản public khi demo qua LAN.
            include __PROJECT_ROOT__/conf/publish.policy.conf;
        }

        application hls {
            # Application RTMP nội bộ nhận bản copy từ "live".
            live on;

            # Chuyển luồng RTMP nhận được thành HLS live cơ bản.
            hls on;
            hls_path data/hls;

            # Độ dài segment và cửa sổ playlist cho live playback.
            hls_fragment 3s;
            hls_playlist_length 30s;

            # Mỗi stream key có thư mục riêng: data/hls/<streamKey>/...
            hls_nested on;

            # Đã ghi recording ở "live", không cần ghi trùng ở đây.
            record off;
            include __PROJECT_ROOT__/conf/publish.policy.conf;

            # Cho phép player lấy HLS output từ application này.
            allow play all;
        }

        application vod {
            # RTMP VOD map trực tiếp tới file local trong /videos.
            # Ví dụ: rtmp://localhost:1935/vod/mp4:sample.mp4
            play __PROJECT_ROOT__/videos;
        }

        application restream {
            # Application nội bộ để đẩy stream outbound sang nền tảng khác.
            live on;
            include __PROJECT_ROOT__/conf/publish.policy.conf;
            include __PROJECT_ROOT__/conf/restream.targets.conf;
        }
    }
}

http {
    # Khai báo MIME để m3u8/ts/mp4/flv được trả đúng content type.
    include       __PROJECT_ROOT__/src/nginx-1.18.0/conf/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    server {
        # HTTP media server:
        # - /hls cho live HLS
        # - /vod cho VOD HLS
        # - /records cho recording thô
        listen 8080;
        server_name localhost;

        # Cho frontend Next.js ở :3000 lấy media asset từ :8080.
        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "no-store" always;

        location / {
            # Trang test tĩnh nhỏ để kiểm tra HLS trực tiếp.
            root   web;
            index  index.html;
        }

        location /hls/ {
            # Public live HLS output sinh ra từ application hls.
            alias __PROJECT_ROOT__/data/hls/;

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }

            # Playlist live không nên bị cache mạnh.
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires -1;
        }

        location /vod/ {
            # Public các asset HLS VOD và poster.
            alias __PROJECT_ROOT__/data/vod/;

            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }

            # Playlist VOD do script/FFmpeg sinh ra, cũng nên được refresh sạch.
            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            expires -1;
        }

        location /records/ {
            # Public recording thô để kiểm tra/debug khi cần.
            alias __PROJECT_ROOT__/data/records/;

            types {
                video/x-flv flv;
                video/mp4 mp4;
            }

            add_header Access-Control-Allow-Origin "*" always;
            add_header Cache-Control "no-store" always;
        }

        location /stat {
            # Trang thống kê runtime XML từ nginx-rtmp.
            rtmp_stat all;
            rtmp_stat_stylesheet stat.xsl;
        }

        location /stat.xsl {
            # File XSL dùng để render trang thống kê RTMP trên trình duyệt.
            alias __PROJECT_ROOT__/src/nginx-rtmp-module/stat.xsl;
        }
    }
}
